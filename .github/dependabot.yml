version: 2
updates:
  # Keep GitHub Actions (checkout, setup-node, ...) up to date.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"

  # Keep npm dependencies (currently @clack/prompts) up to date.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
    labels:
      - "dependencies"
    versioning-strategy: increase
